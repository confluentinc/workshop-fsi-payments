# RiverPay-lite producer + KafkaTopic CRs
# JSON wire format (Avro + Schema Registry is a follow-on).
# Produces the four formalized lifecycle topics used by the Cloud workshop.
#
# kafka.properties (base64): bootstrap.servers=kafka.confluent.svc.cluster.local:9071
#                            security.protocol=PLAINTEXT
apiVersion: v1
kind: Secret
metadata:
  name: kafka-client-config
  namespace: confluent
type: Opaque
data:
  kafka.properties: Ym9vdHN0cmFwLnNlcnZlcnM9a2Fma2EuY29uZmx1ZW50LnN2Yy5jbHVzdGVyLmxvY2FsOjkwNzEKc2VjdXJpdHkucHJvdG9jb2w9UExBSU5URVhU
---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaTopic
metadata:
  name: riverflow-payments-initiation
  namespace: confluent
spec:
  name: riverflow.payments.initiation
  replicas: 3
  partitionCount: 1
  configs:
    cleanup.policy: "delete"
---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaTopic
metadata:
  name: riverflow-payments-authorization
  namespace: confluent
spec:
  name: riverflow.payments.authorization
  replicas: 3
  partitionCount: 1
  configs:
    cleanup.policy: "delete"
---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaTopic
metadata:
  name: riverflow-payments-balance-update
  namespace: confluent
spec:
  name: riverflow.payments.balance_update
  replicas: 3
  partitionCount: 1
  configs:
    cleanup.policy: "delete"
---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaTopic
metadata:
  name: riverflow-payments-status
  namespace: confluent
spec:
  name: riverflow.payments.status
  replicas: 3
  partitionCount: 1
  configs:
    cleanup.policy: "delete"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: riverpay-producer
  namespace: confluent
  labels:
    app: riverpay-producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: riverpay-producer
  template:
    metadata:
      labels:
        app: riverpay-producer
    spec:
      containers:
        - name: producer
          image: confluentinc/cp-kafka:8.1.0
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              CONFIG=/mnt/kafka.properties
              BOOTSTRAP=kafka.confluent.svc.cluster.local:9071
              echo "Waiting for Kafka at $${BOOTSTRAP}..."
              for i in $(seq 1 60); do
                if kafka-broker-api-versions --bootstrap-server "$${BOOTSTRAP}" >/dev/null 2>&1; then
                  echo "Kafka is reachable."
                  break
                fi
                sleep 5
              done
              CUSTOMERS=(CUST-100234 CUST-100891 CUST-101102 CUST-102440)
              CHANNELS=(mobile_app web branch partner_api)
              while true; do
                TS=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
                SEQ=$(date +%s)
                PAYMENT_ID="PMT-$${SEQ}"
                CUST="$${CUSTOMERS[$((RANDOM % $${#CUSTOMERS[@]}))]}"
                AMOUNT=$((50 + RANDOM % 950)).$((RANDOM % 100))
                CHANNEL="$${CHANNELS[$((RANDOM % $${#CHANNELS[@]}))]}"
                AUTH="AUTH-$(printf '%06X' $((RANDOM % 16777215)))"

                INIT=$(cat <<EOF
              {"payment_id":"$${PAYMENT_ID}","customer_id":"$${CUST}","source_account":"ACC-88213340","destination_account":"ACC-55019284","amount":$${AMOUNT},"currency":"USD","payment_type":"instant_credit_transfer","channel":"$${CHANNEL}","initiated_at":"$${TS}","status":"initiated"}
              EOF
              )
                AUTH_EVT=$(cat <<EOF
              {"payment_id":"$${PAYMENT_ID}","customer_id":"$${CUST}","authorization_code":"$${AUTH}","validation_result":"passed","authorized_at":"$${TS}","status":"authorized"}
              EOF
              )
                BAL=$(cat <<EOF
              {"payment_id":"$${PAYMENT_ID}","customer_id":"$${CUST}","source_account":"ACC-88213340","destination_account":"ACC-55019284","amount":$${AMOUNT},"currency":"USD","source_balance_after":3117.42,"destination_balance_after":9820.10,"updated_at":"$${TS}","status":"balance_updated"}
              EOF
              )
                STAT=$(cat <<EOF
              {"payment_id":"$${PAYMENT_ID}","customer_id":"$${CUST}","status":"completed","status_reason":"settlement_confirmed","completed_at":"$${TS}"}
              EOF
              )

                echo "$${INIT}"  | kafka-console-producer --producer.config "$${CONFIG}" --topic riverflow.payments.initiation
                echo "$${AUTH_EVT}" | kafka-console-producer --producer.config "$${CONFIG}" --topic riverflow.payments.authorization
                echo "$${BAL}"   | kafka-console-producer --producer.config "$${CONFIG}" --topic riverflow.payments.balance_update
                echo "$${STAT}"  | kafka-console-producer --producer.config "$${CONFIG}" --topic riverflow.payments.status
                echo "Produced RiverPay lifecycle for $${PAYMENT_ID}"
                sleep 2
              done
          volumeMounts:
            - name: kafka-properties
              mountPath: /mnt
              readOnly: true
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: kafka-properties
          secret:
            secretName: kafka-client-config
